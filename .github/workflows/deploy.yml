name: Deploy to Easypanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel Deploy (agenda frontend app webhook)
        run: |
          echo "Triggering Easypanel deploy for the agenda frontend app..."
          RESPONSE=$(curl -sS -m 60 -w $'\nHTTP_STATUS:%{http_code}' -X POST \
            "http://164.68.116.21:3000/api/deploy/19e3a2d294ed2a25f8e8d8b784c8cd0b321d3a3502b60e05")
          echo "Easypanel response: $RESPONSE"
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          STATUS=$(echo "$RESPONSE" | grep -o 'HTTP_STATUS:[0-9]*' | cut -d: -f2)
          # Fail the job if Easypanel rejected the deploy, so we never get a false green again.
          if [ "$STATUS" != "200" ] || echo "$BODY" | grep -qiE "invalid|unauthorized|forbidden|not found"; then
            echo "::error::Easypanel rejected the deploy (HTTP $STATUS): $BODY"
            exit 1
          fi
          echo "Deploy triggered successfully (HTTP $STATUS)."
